# Stop NetworkManager from managing the goggle's USB-ethernet gadget.
#
# The gadget has no DHCP server and re-randomizes its MAC each boot (enx<mac>),
# so NM would otherwise hold it "disconnected" and flush any manually-set IP.
# Marking enx* unmanaged lets a static `ip addr add` stick. This only matches
# enx* (USB-ethernet) names; on-board/wifi NICs (enp*/eno*/wlp*) are untouched.
#
# Install (Linux, NetworkManager):
#   sudo install -m644 99-artosyn-unmanaged.conf /etc/NetworkManager/conf.d/
#   sudo systemctl reload NetworkManager
#   nmcli device status          # the enx* line should now read: unmanaged
#
# Uninstall: remove the file from /etc/NetworkManager/conf.d/ and reload again.
#
# See docs/05-host-network-setup.md for the full explanation.
[keyfile]
unmanaged-devices=interface-name:enx*;interface-name:br-artosyn
